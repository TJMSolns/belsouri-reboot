name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Rust backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Build
        run: cd src-tauri && cargo build
      - name: Tests
        run: cd src-tauri && cargo test
      - name: Clippy
        run: cd src-tauri && cargo clippy -- -D warnings

  frontend:
    name: Frontend + IPC contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: IPC contract check (rename_all + snake_case keys)
        run: pnpm check:ipc
      - name: TypeScript check
        run: pnpm check
